name: Public CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Diagnose archive token in root docs
        run: '! find core/hakim-skill -maxdepth 1 -type f -name "*.md" -exec grep -lF "ARCHIVE_POLICY.md" {} + | grep -q .'

      - name: Diagnose archive token in capability docs
        run: '! grep -R -lF --include="*.md" "ARCHIVE_POLICY.md" core/hakim-skill/skills 2>/dev/null | grep -q .'

      - name: Diagnose archive token in references
        run: '! grep -R -lF --include="*.md" "ARCHIVE_POLICY.md" core/hakim-skill/references 2>/dev/null | grep -q .'

      - name: Diagnose archive token in assets
        run: '! grep -R -lF --include="*.md" "ARCHIVE_POLICY.md" core/hakim-skill/assets 2>/dev/null | grep -q .'

      - name: Diagnose archive token in scripts
        run: '! grep -R -lF --include="*.md" "ARCHIVE_POLICY.md" core/hakim-skill/scripts 2>/dev/null | grep -q .'

      - name: Diagnose archive token in conformance
        run: '! grep -R -lF --include="*.md" "ARCHIVE_POLICY.md" core/hakim-skill/conformance 2>/dev/null | grep -q .'

      - name: Diagnose archive token in other package docs
        run: |
          ! find core/hakim-skill -mindepth 2 -type f -name "*.md" \
            ! -path "core/hakim-skill/skills/*" \
            ! -path "core/hakim-skill/references/*" \
            ! -path "core/hakim-skill/assets/*" \
            ! -path "core/hakim-skill/scripts/*" \
            ! -path "core/hakim-skill/conformance/*" \
            -exec grep -lF "ARCHIVE_POLICY.md" {} + | grep -q .

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Verify first-run contract
        run: npm run check:first-run

      - name: Verify maintained script syntax
        run: npm run check:evidence-script

      - name: Verify host-native plugin contracts
        run: |
          npm run check:codex-projection
          npm run check:claude-projection
          npm run check:copilot-projection

      - name: Verify capability parity
        run: npm run check:capability-parity

      - name: Verify cross-host conformance
        run: npm run check:conformance

      - name: Verify native host preflight contract
        run: node tests/test_hakim_host_preflight.mjs

      - name: Verify core governance contracts
        run: |
          node tests/test_rule_copies.js
          node tests/test_rule_missing_section.js
          node tests/test_upstream_relationship.js
          node tests/test_hakim_doctor.mjs
          node tests/test_structured_metadata.js
          node tests/test_hakim_guarded_session.mjs

      - name: Verify native plugin smoke
        run: node tests/test_plugin_smoke.js

      - name: Verify OpenCode runtime plugin
        run: node tests/test_opencode_plugin.mjs

      - name: Verify OpenCode project-local lifecycle
        run: node tests/test_hakim_opencode_lifecycle.mjs

      - name: Verify host fallback and lifecycle contracts
        run: |
          node tests/test_claude_diagnostic_hook.js
          node tests/test_hakim_install_plan.mjs
          node tests/test_hakim_codex_launch.mjs
          node tests/test_hakim_claude_launch.mjs
          node tests/test_hakim_copilot_install.mjs
          node tests/test_hakim_copilot_remove.mjs

      - name: Verify review and PR guardian contracts
        run: |
          node tests/test_hakim_pr_guardian.mjs
          node tests/test_hakim_review_pr.mjs

      - name: Verify conformance fixture generation
        run: |
          node tests/test_cross_adapter_conformance.js
          node tests/test_generate_conformance_packets_no_git.js

      - name: Verify public repository and package boundaries
        run: |
          npm run check:public-boundary
          npm run check:public-package

      - name: Run public Python tests
        run: npm run test:public:py

      - name: Diagnose source-checkout audit command
        run: '! grep -R -nF --include="*.md" "python core/hakim-skill/scripts/audit_complexity.py" core/hakim-skill'

      - name: Diagnose missing archive authority
        run: '! grep -R -nF --include="*.md" "ARCHIVE_POLICY.md" core/hakim-skill'

      - name: Diagnose obsolete MCP deploy command
        run: '! grep -R -nF --include="*.md" "mcp deploy hakim-skill-package.zip" core/hakim-skill'

      - name: Diagnose obsolete MCP compatibility contract
        run: '! grep -R -nF --include="*.md" "MCP namespace must remain" core/hakim-skill'

      - name: Diagnose obsolete A2A compatibility contract
        run: '! grep -R -nF --include="*.md" "A2A message schema must remain" core/hakim-skill'

      - name: Diagnose obsolete private test taxonomy
        run: '! grep -R -nF --include="*.md" "T-YAML-001" core/hakim-skill'

      - name: Diagnose obsolete private review taxonomy
        run: '! grep -R -nF --include="*.md" "R1-R6 reviews" core/hakim-skill'

      - name: Build skill archive
        run: mkdir -p dist && python core/hakim-skill/scripts/package_skill.py --source core/hakim-skill --output dist/hakim-skill.zip

      - name: Verify skill package structure
        run: python scripts/verify_package.py dist/hakim-skill.zip --section structure

      - name: Verify skill package documentation
        run: python scripts/verify_package.py dist/hakim-skill.zip --section docs

      - name: Verify skill package conformance
        run: python scripts/verify_package.py dist/hakim-skill.zip --section conformance

      - name: Verify complete skill package
        run: python scripts/verify_package.py dist/hakim-skill.zip
