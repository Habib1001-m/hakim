name: Public CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Verify first-run contract
        run: npm run check:first-run

      - name: Run public JavaScript tests
        run: npm run test:public:js

      - name: Python tests A
        run: python -m unittest discover -s tests -p 'test_a*.py'

      - name: Python tests B
        run: python -m unittest discover -s tests -p 'test_b*.py'

      - name: Python tests C
        run: python -m unittest discover -s tests -p 'test_c*.py'

      - name: Python tests D-Z
        run: python -m unittest discover -s tests -p 'test_[d-z]*.py'

      - name: Build skill package
        run: npm run package:skill

      - name: Build native plugin package
        run: npm run build:native-plugin
