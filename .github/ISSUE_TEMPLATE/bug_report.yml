name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, private source code, raw prompts, or sensitive evidence.
  - type: input
    id: version
    attributes:
      label: Hakim version or commit
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest sanitized reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node, Python, host, and relevant versions.
